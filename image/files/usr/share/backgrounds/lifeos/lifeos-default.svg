<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>LifeOS Default Wallpaper</title>
  <desc>LifeOS default wallpaper with gradient background</desc>
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f4c75;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent glow -->
    <radialGradient id="accent-glow" cx="75%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:#3282b8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3282b8;stop-opacity:0" />
    </radialGradient>
    
    <!-- Subtle pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
    </pattern>
  </defs>
  
  <!-- Main background -->
  <rect width="1920" height="1080" fill="url(#bg-gradient)"/>
  
  <!-- Grid overlay -->
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Accent glow -->
  <ellipse cx="1440" cy="378" rx="600" ry="400" fill="url(#accent-glow)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="150" r="80" fill="#3282b8" opacity="0.1"/>
  <circle cx="1750" cy="900" r="120" fill="#0f4c75" opacity="0.15"/>
  <circle cx="960" cy="540" r="300" fill="none" stroke="#3282b8" stroke-width="1" opacity="0.1"/>
  
  <!-- LifeOS logo mark (abstract) -->
  <g transform="translate(960, 540)" opacity="0.08">
    <circle cx="0" cy="0" r="150" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="#3282b8"/>
  </g>
</svg>
