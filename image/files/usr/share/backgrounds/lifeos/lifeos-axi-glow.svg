<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160" width="3840" height="2160">
  <title>LifeOS Axi Glow</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05070E"/>
      <stop offset="55%" stop-color="#0A0F1F"/>
      <stop offset="100%" stop-color="#14172C"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7AFFE5"/>
      <stop offset="55%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#0A8E72"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#00D4AA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <!-- Dark navy background -->
  <rect width="3840" height="2160" fill="url(#bg)"/>

  <!-- Scattered bokeh / star particles -->
  <g>
    <circle cx="180"  cy="220"  r="2.5" fill="#E8E8E8" opacity="0.45"/>
    <circle cx="420"  cy="140"  r="1.8" fill="#00D4AA" opacity="0.35"/>
    <circle cx="760"  cy="320"  r="3.2" fill="#E8E8E8" opacity="0.30"/>
    <circle cx="1180" cy="180"  r="2.0" fill="#00D4AA" opacity="0.55"/>
    <circle cx="1520" cy="260"  r="2.6" fill="#E8E8E8" opacity="0.20"/>
    <circle cx="2200" cy="120"  r="3.6" fill="#00D4AA" opacity="0.40"/>
    <circle cx="2560" cy="240"  r="1.6" fill="#E8E8E8" opacity="0.50"/>
    <circle cx="2940" cy="160"  r="2.2" fill="#00D4AA" opacity="0.25"/>
    <circle cx="3260" cy="300"  r="3.0" fill="#E8E8E8" opacity="0.35"/>
    <circle cx="3620" cy="200"  r="2.4" fill="#00D4AA" opacity="0.45"/>

    <circle cx="240"  cy="640"  r="2.0" fill="#E8E8E8" opacity="0.30"/>
    <circle cx="640"  cy="780"  r="3.4" fill="#00D4AA" opacity="0.20"/>
    <circle cx="980"  cy="540"  r="1.8" fill="#E8E8E8" opacity="0.55"/>
    <circle cx="3080" cy="700"  r="2.6" fill="#00D4AA" opacity="0.40"/>
    <circle cx="3380" cy="860"  r="3.0" fill="#E8E8E8" opacity="0.25"/>
    <circle cx="3680" cy="540"  r="1.5" fill="#00D4AA" opacity="0.50"/>

    <circle cx="160"  cy="1240" r="3.2" fill="#E8E8E8" opacity="0.30"/>
    <circle cx="540"  cy="1380" r="2.4" fill="#00D4AA" opacity="0.45"/>
    <circle cx="3320" cy="1200" r="2.0" fill="#E8E8E8" opacity="0.35"/>
    <circle cx="3720" cy="1340" r="3.6" fill="#00D4AA" opacity="0.20"/>

    <circle cx="320"  cy="1720" r="2.8" fill="#E8E8E8" opacity="0.50"/>
    <circle cx="700"  cy="1880" r="1.8" fill="#00D4AA" opacity="0.35"/>
    <circle cx="1140" cy="1960" r="3.0" fill="#E8E8E8" opacity="0.25"/>
    <circle cx="1620" cy="1800" r="2.2" fill="#00D4AA" opacity="0.55"/>
    <circle cx="2080" cy="1980" r="1.6" fill="#E8E8E8" opacity="0.40"/>
    <circle cx="2520" cy="1860" r="3.4" fill="#00D4AA" opacity="0.20"/>
    <circle cx="2960" cy="1920" r="2.6" fill="#E8E8E8" opacity="0.35"/>
    <circle cx="3340" cy="1760" r="2.0" fill="#00D4AA" opacity="0.45"/>
    <circle cx="3580" cy="2000" r="1.8" fill="#E8E8E8" opacity="0.30"/>
    <circle cx="3780" cy="1880" r="2.4" fill="#00D4AA" opacity="0.50"/>
  </g>

  <!-- Outer blurred radial glow disc -->
  <circle cx="1920" cy="1080" r="700" fill="#00D4AA" opacity="0.10" filter="url(#blur)"/>

  <!-- Soft halo gradient -->
  <circle cx="1920" cy="1080" r="560" fill="url(#halo)"/>

  <!-- Three concentric stroked rings -->
  <circle cx="1920" cy="1080" r="440" fill="none" stroke="#00D4AA" stroke-width="4" opacity="0.55"/>
  <circle cx="1920" cy="1080" r="360" fill="none" stroke="#00D4AA" stroke-width="5" opacity="0.75"/>
  <circle cx="1920" cy="1080" r="280" fill="none" stroke="#00D4AA" stroke-width="6" opacity="0.90"/>

  <!-- Inner filled core disc with radial gradient -->
  <circle cx="1920" cy="1080" r="260" fill="url(#core)"/>

  <!-- Inner highlight to make the glow pop -->
  <circle cx="1880" cy="1040" r="120" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="1900" cy="1060" r="60"  fill="#FFFFFF" opacity="0.18"/>
</svg>
