<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160" width="3840" height="2160">
  <title>LifeOS Minimal - Clean Dark Wallpaper</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1"/>
    </linearGradient>
    <!-- Single subtle teal accent -->
    <radialGradient id="accent" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <ellipse cx="1920" cy="1080" rx="1600" ry="900" fill="url(#accent)"/>
</svg>
