<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>LifeOS Light Wallpaper</title>
  <desc>LifeOS light variant wallpaper for light mode</desc>
  
  <!-- Background gradient - Light variant -->
  <defs>
    <linearGradient id="bg-gradient-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4f8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent glow -->
    <radialGradient id="accent-glow-light" cx="75%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:#3282b8;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#3282b8;stop-opacity:0" />
    </radialGradient>
    
    <!-- Subtle pattern -->
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#0f4c75" opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- Main background -->
  <rect width="1920" height="1080" fill="url(#bg-gradient-light)"/>
  
  <!-- Dots overlay -->
  <rect width="1920" height="1080" fill="url(#dots)"/>
  
  <!-- Accent glow -->
  <ellipse cx="1440" cy="378" rx="600" ry="400" fill="url(#accent-glow-light)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="150" r="80" fill="#3282b8" opacity="0.05"/>
  <circle cx="1750" cy="900" r="120" fill="#0f4c75" opacity="0.08"/>
  <circle cx="960" cy="540" r="300" fill="none" stroke="#3282b8" stroke-width="1" opacity="0.1"/>
  
  <!-- Abstract wave pattern -->
  <path d="M0,700 Q480,600 960,700 T1920,650 L1920,1080 L0,1080 Z" fill="#0f4c75" opacity="0.03"/>
  <path d="M0,750 Q480,650 960,750 T1920,700 L1920,1080 L0,1080 Z" fill="#3282b8" opacity="0.02"/>
  
  <!-- LifeOS logo mark (abstract) -->
  <g transform="translate(960, 540)" opacity="0.04">
    <circle cx="0" cy="0" r="150" fill="none" stroke="#0f4c75" stroke-width="3"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#0f4c75" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="#3282b8"/>
  </g>
</svg>
