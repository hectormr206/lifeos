<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Axi Healthy - Base state with smile, relaxed gills -->
  <!-- Proportions: Head 30%, Gills 20%, Body 40%, Tail 10% -->
  <!-- Palette: Rosa Axi #FF6B9D, Verde Regeneración #00D4AA, Azul LifeOS #3282B8, Púrpura Profundo #1A1A2E, Blanco Hueso #E8E8E8 -->
  
  <defs>
    <!-- Gradient for body -->
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="100%" style="stop-color:#E8558A"/>
    </linearGradient>
    <!-- Gradient for gills -->
    <linearGradient id="gillGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="100%" style="stop-color:#FF8EB8"/>
    </linearGradient>
  </defs>
  
  <!-- Tail (10% - y: 410-512) -->
  <path d="M200 410 Q180 450 160 480 Q200 500 256 490 Q312 500 352 480 Q332 450 312 410" 
        fill="url(#bodyGradient)" stroke="#E8558A" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Body (40% - y: 210-410) -->
  <ellipse cx="256" cy="310" rx="120" ry="100" fill="url(#bodyGradient)" stroke="#E8558A" stroke-width="3"/>
  
  <!-- Belly pattern -->
  <ellipse cx="256" cy="330" rx="80" ry="60" fill="#FFB8D0" opacity="0.6"/>
  
  <!-- Small legs -->
  <ellipse cx="200" cy="400" rx="25" ry="15" fill="url(#bodyGradient)" stroke="#E8558A" stroke-width="2"/>
  <ellipse cx="312" cy="400" rx="25" ry="15" fill="url(#bodyGradient)" stroke="#E8558A" stroke-width="2"/>
  
  <!-- Gills (20% - y: 150-210) - 3 pairs -->
  <!-- Left gills -->
  <path d="M130 160 Q100 170 90 195 Q110 190 130 180" fill="url(#gillGradient)" stroke="#FF8EB8" stroke-width="2"/>
  <path d="M125 175 Q95 185 85 210 Q105 205 125 195" fill="url(#gillGradient)" stroke="#FF8EB8" stroke-width="2"/>
  <path d="M120 190 Q90 200 80 225 Q100 220 120 210" fill="url(#gillGradient)" stroke="#FF8EB8" stroke-width="2"/>
  
  <!-- Right gills -->
  <path d="M382 160 Q412 170 422 195 Q402 190 382 180" fill="url(#gillGradient)" stroke="#FF8EB8" stroke-width="2"/>
  <path d="M387 175 Q417 185 427 210 Q407 205 387 195" fill="url(#gillGradient)" stroke="#FF8EB8" stroke-width="2"/>
  <path d="M392 190 Q422 200 432 225 Q412 220 392 210" fill="url(#gillGradient)" stroke="#FF8EB8" stroke-width="2"/>
  
  <!-- Head (30% - y: 0-150) -->
  <ellipse cx="256" cy="90" rx="130" ry="90" fill="url(#bodyGradient)" stroke="#E8558A" stroke-width="3"/>
  
  <!-- Eyes - Happy expression ◕ ◕ -->
  <ellipse cx="200" cy="80" rx="30" ry="35" fill="#E8E8E8"/>
  <ellipse cx="312" cy="80" rx="30" ry="35" fill="#E8E8E8"/>
  <ellipse cx="205" cy="85" rx="15" ry="18" fill="#1A1A2E"/>
  <ellipse cx="317" cy="85" rx="15" ry="18" fill="#1A1A2E"/>
  <!-- Eye shine -->
  <circle cx="210" cy="78" r="6" fill="#FFFFFF"/>
  <circle cx="322" cy="78" r="6" fill="#FFFFFF"/>
  
  <!-- Smile - Happy -->
  <path d="M220 120 Q256 150 292 120" fill="none" stroke="#1A1A2E" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Rosy cheeks -->
  <ellipse cx="165" cy="105" rx="20" ry="12" fill="#FF8EB8" opacity="0.5"/>
  <ellipse cx="347" cy="105" rx="20" ry="12" fill="#FF8EB8" opacity="0.5"/>
</svg>
