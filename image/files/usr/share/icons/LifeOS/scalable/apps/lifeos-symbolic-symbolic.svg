<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <title>LifeOS Application Icon</title>
  <desc>Official LifeOS application icon with brand colors</desc>

  <!-- Background circle with brand gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A3E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F0F1B;stop-opacity:1" />
    </linearGradient>

    <!-- Inner glow -->
    <radialGradient id="inner-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Main circle -->
  <circle cx="64" cy="64" r="56" fill="url(#bg-gradient)"/>

  <!-- Inner glow overlay -->
  <circle cx="64" cy="64" r="56" fill="url(#inner-glow)"/>

  <!-- LifeOS Logo Mark -->
  <g transform="translate(64, 64)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="#E8E8E8" stroke-width="4" opacity="0.9"/>

    <!-- Middle ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#E8E8E8" stroke-width="3" opacity="0.7"/>

    <!-- Inner circle (core) -->
    <circle cx="0" cy="0" r="12" fill="#E8E8E8"/>

    <!-- Pulse lines (representing life/vitality) -->
    <g stroke="#E8E8E8" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
      <!-- Top pulse -->
      <path d="M-6,-38 L0,-44 L6,-38" fill="none"/>
      <!-- Right pulse -->
      <path d="M38,-6 L44,0 L38,6" fill="none"/>
      <!-- Bottom pulse -->
      <path d="M-6,38 L0,44 L6,38" fill="none"/>
      <!-- Left pulse -->
      <path d="M-38,-6 L-44,0 L-38,6" fill="none"/>
    </g>

    <!-- Orbit dots -->
    <circle cx="0" cy="-32" r="3" fill="#E8E8E8" opacity="0.6"/>
    <circle cx="32" cy="0" r="3" fill="#E8E8E8" opacity="0.6"/>
    <circle cx="0" cy="32" r="3" fill="#E8E8E8" opacity="0.6"/>
    <circle cx="-32" cy="0" r="3" fill="#E8E8E8" opacity="0.6"/>
  </g>

  <!-- Highlight arc -->
  <path d="M64,8 A56,56 0 0,1 120,64" fill="none" stroke="#E8E8E8" stroke-width="2" opacity="0.2"/>
</svg>
