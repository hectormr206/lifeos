# /run/lifeos — host-side runtime directory shared with the lifeos-lifeosd
# Quadlet container. The container's daemon writes bootstrap.token here
# (LIFEOS_RUNTIME_DIR=/run/lifeos in the Quadlet) and the host-side
# lifeos-sentinel.sh reads it each probe to authenticate /api/v1/health.
# Without this entry the bind mount fails because the host path doesn't
# exist on a fresh boot (tmpfs is wiped each cycle).
#
# Mode 0750 root:root: only root reads the bootstrap.token (sentinel runs
# as root, daemon inside the container effectively writes as the rootful
# bind mount owner = root on host). The previous lifeos-secrets.conf
# entry tried `0750 root:lifeos` but the `lifeos` group is not created
# anywhere in the image — that line silently fell back to default mode.
d /run/lifeos 0750 root root - -
