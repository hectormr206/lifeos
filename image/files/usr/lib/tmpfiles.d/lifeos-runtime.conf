# /run/lifeos — host-side runtime directory shared with the lifeos-lifeosd
# Quadlet container. The container's daemon writes:
#   - /run/lifeos/bootstrap.token (mode 0600 root:root, held by the
#     daemon's own write — file perms gate token reads even when the
#     enclosing dir is world-traversable).
#   - /run/lifeos/lifeos-bootstrap.sock (Phase 8c, mode 0666; auth is
#     SO_PEERCRED inside the daemon, not file perms).
#
# Mode 0751 root:root: world-EXECUTE-only. The execute bit lets a
# non-root caller `connect()` to a known-path file inside (the
# `lifeos-bootstrap.sock` socket) but the absent read bit blocks
# `readdir()` — non-root users cannot enumerate the directory's
# contents. Files inside keep their own perms (bootstrap.token is 0600
# → readable by root only; the socket is 0666 + kernel-credential gate).
# Round-3 JD of Phase 8c chose 0751 over 0755 because the readdir
# leak is cheap to close (free in a tmpfiles edit) and avoids the
# minor info-disclosure surface of "non-root can `ls` to learn which
# lifeos services are running".
d /run/lifeos 0751 root root - -
