# /run/lifeos — host-side runtime directory shared with the lifeos-lifeosd
# Quadlet container. The container's daemon writes:
#   - /run/lifeos/bootstrap.token (mode 0600 root:root, held by the
#     daemon's own write — file perms gate token reads even when the
#     enclosing dir is world-traversable).
#   - /run/lifeos/lifeos-bootstrap.sock (Phase 8c, mode 0666; auth is
#     SO_PEERCRED inside the daemon, not file perms).
#
# Mode 0755 root:root: world-traversable so the user session
# (`lifeos-desktop` companion, `life` CLI invoked by the user) can
# `connect()` the SO_PEERCRED socket without a custom group dance.
# Files inside keep their own perms (bootstrap.token is 0600 → readable
# by root only; the socket is 0666 + kernel-credential gate). Round-2 JD
# of Phase 8c caught that 0700/0750 here makes the entire socket-based
# token handout a no-op for non-root users.
d /run/lifeos 0755 root root - -
