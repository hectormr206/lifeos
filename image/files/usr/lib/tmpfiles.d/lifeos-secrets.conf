# LifeOS secrets hardening — force 0600 on token-bearing files.
#
# Prior defaults left these files world-readable (0644) which is a
# credential-leak surface. systemd-tmpfiles runs on boot and reapplies
# these modes even if the daemon writes them with a permissive umask.
#
# z = set mode/owner on existing files only, do not create.
# Z = recursive variant for the actions-runner working directory.

# Actions runner .env — PAT / registration token lives here.
z /var/lib/lifeos/actions-runner/.env 0600 lifeos-runner lifeos-runner -

# Per-user LLM provider tokens (OpenAI, Anthropic, etc).
# User file — owned by the primary interactive user (uid 1000).
z /home/lifeos/.config/lifeos/llm-providers.env 0600 1000 1000 -

# /run/lifeos lives in lifeos-runtime.conf (Phase 3 of the architecture
# pivot moved its definition out of this file). Both the SIGSTOP wrapper
# AND the lifeos-lifeosd Quadlet's bootstrap.token bind use the same
# directory; keeping the canonical entry in one place prevents tmpfiles
# from running two `d` directives with conflicting modes.
