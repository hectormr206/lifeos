# LifeOS MCP Server Configuration
# Servers listed here are auto-discovered at daemon startup.
# Add your own MCP servers below.

# Official MCP servers (Anthropic reference implementations)
# These require the corresponding npm packages installed.

[servers.filesystem]
enabled = false
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/home/lifeos"]
description = "Access local filesystem"

[servers.git]
enabled = false
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-git"]
description = "Git repository operations"

[servers.memory]
enabled = false
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
description = "Persistent memory storage"

[servers.fetch]
enabled = false
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-fetch"]
description = "Fetch web content"

[servers.sequential-thinking]
enabled = false
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
description = "Step-by-step reasoning"

# Third-party servers

[servers.github]
enabled = false
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_PERSONAL_ACCESS_TOKEN = "" }
description = "GitHub API operations (issues, PRs, repos)"

[servers.brave-search]
enabled = false
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search"]
env = { BRAVE_API_KEY = "" }
description = "Web search via Brave Search API"

[servers.puppeteer]
enabled = false
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-puppeteer"]
description = "Browser automation via Puppeteer"
