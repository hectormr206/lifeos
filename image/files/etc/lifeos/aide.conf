# LifeOS AIDE Configuration — File Integrity Monitoring (CIS Benchmark)
# Monitors mutable system directories for unauthorized changes.
# immutable /usr is already protected by ComposeFS + fs-verity.

# Database locations (in /var since /usr is read-only)
database_in=file:/var/lib/aide/aide.db
database_out=file:/var/lib/aide/aide.db.new
database_new=file:/var/lib/aide/aide.db.new

# What to check
NORMAL = p+i+n+u+g+s+m+c+sha256
DIR = p+i+n+u+g
PERMS = p+u+g

# Monitor these mutable directories
/etc NORMAL
/var/lib/lifeos NORMAL

# Exclude noisy/expected changes
!/etc/mtab
!/etc/resolv.conf
!/etc/adjtime
!/etc/machine-id
!/var/lib/lifeos/boot_count
!/var/lib/aide
