# LifeOS COSMIC Theme Configuration
# This file configures the default theme and theme preferences for COSMIC desktop

[theme]
# Default theme: "LifeOS-Dark" | "LifeOS-Light" | "LifeOS-HighContrast"
default = "LifeOS-Dark"

# Auto-switch between dark/light based on time of day
auto_switch = false

# Time ranges for auto-switch (24h format)
dark_mode_start = 19  # 7 PM
light_mode_start = 7  # 7 AM

[accessibility]
# Enable high contrast mode by default
high_contrast_default = false

# Increase cursor size for accessibility
large_cursor = false
cursor_size = 24  # 24 (default) | 32 (large) | 48 (extra large)

# Reduce motion/animations
reduce_motion = false

[colors]
# LifeOS brand colors for reference
# Primary: #00D4AA (Axi Teal)
# Accent: #FF6B9D (Axi Pink)

[dark]
name = "LifeOS Dark"
background = "#0F0F1B"
surface = "#161830"
primary = "#00D4AA"
accent = "#FF6B9D"
text = "#E8E8E8"
text_muted = "#737587"
error = "#FF6B9D"
warning = "#F0C420"
success = "#00D4AA"

[light]
name = "LifeOS Light"
background = "#F5F8F7"
surface = "#ffffff"
primary = "#00D4AA"
accent = "#FF6B9D"
text = "#161830"
text_muted = "#5E6078"
error = "#FF6B9D"
warning = "#E6B323"
success = "#00B89A"

[high_contrast]
name = "LifeOS High Contrast"
background = "#000000"
surface = "#1a1a1a"
primary = "#00ff00"
accent = "#ffff00"
text = "#ffffff"
text_muted = "#cccccc"
error = "#ff0000"
warning = "#ffff00"
success = "#00ff00"
