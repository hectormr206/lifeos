# LifeOS — System-wide encrypted DNS via DNS-over-TLS (Quad9)
# Firefox already has DoH configured; this covers ALL system DNS
# (curl, git, flatpak, podman, dnf, etc.)
#
# Quad9 (9.9.9.9) blocks known malware/phishing domains.
# Cloudflare (1.1.1.1) as fallback.

[Resolve]
DNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net 2620:fe::fe#dns.quad9.net
FallbackDNS=1.1.1.1#cloudflare-dns.com 2606:4700:4700::1111#cloudflare-dns.com
DNSOverTLS=opportunistic
DNSSEC=allow-downgrade
