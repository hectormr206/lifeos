# LifeOS zram swap configuration.
# Creates a compressed RAM swap device as the backing store for zswap.
# Together: zswap compresses pages in RAM → if zswap pool is full,
# least-used pages go to zram (still in RAM, double-compressed).
# Result: SSD never touched for swap, better under memory pressure.
[zram0]
zram-size = min(ram / 2, 8192)
compression-algorithm = zstd
swap-priority = 100
