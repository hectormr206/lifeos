# LifeOS: Force volume persistence across Bluetooth profile switches.
#
# When a BT device switches from A2DP to HSP/HFP (e.g., for a meeting),
# the new node gets default volume (often 100%). This rule ensures the
# volume from the previous profile is applied to the new one.

wireplumber.settings = {
    # Store and restore device volumes in the state file
    bluetooth.use-persistent-storage = true
}

# Route settings: store volumes per device, not per node
monitor.bluez.rules = [
  {
    matches = [
      { node.name = "~bluez_*" }
    ]
    actions = {
      update-props = {
        # Save volume per device across profile switches
        node.save-volume = true
        session.save-volume = true
      }
    }
  }
]
