# LifeOS: Auto-switch microphone input when Bluetooth headset connects.
# When a BT device with mic capability connects, WirePlumber routes both
# output AND input to the headset automatically.
#
# This rule watches for new BT source nodes (microphone side) and sets
# them as the default input device when they appear.
#
# Complements 50-lifeos-bluetooth.conf which handles profile connections,
# and 11-bluetooth-policy.conf which manages the volume desync workaround.

wireplumber.settings = {
  # Auto-switch default source when new BT mic becomes available
  bluetooth.autoswitch-to-headset-profile = true
}

# When a Bluetooth source node appears, prefer it as the default input.
# This ensures the mic switches automatically when BT headset connects.
monitor.bluez.rules = [
  {
    matches = [
      { node.name = "~bluez_input.*" }
    ]
    actions = {
      update-props = {
        # Raise priority so WirePlumber prefers BT mic over built-in
        priority.session = 2500
        priority.driver = 2500
        node.pause-on-idle = false
      }
    }
  }
]
