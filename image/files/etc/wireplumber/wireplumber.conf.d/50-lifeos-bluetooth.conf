# LifeOS: Preserve Bluetooth volume when switching between A2DP and HSP/HFP profiles.
#
# Problem: When WirePlumber auto-switches from A2DP (music) to HSP/HFP (meeting/mic),
# PipeWire resets volume to 100%. When the meeting ends and it switches back to A2DP,
# the original volume is restored, causing a jarring volume jump during meetings.
#
# Solution: Restore the saved volume after profile switches.

monitor.bluez.properties = {
    # Keep the same volume when switching BT profiles (A2DP <-> HSP/HFP)
    bluez5.auto-connect = [ hfp_hf hfp_ag hsp_hs hsp_ag a2dp_sink a2dp_source ]
}

wireplumber.settings = {
    # Preserve volume across Bluetooth profile switches
    bluetooth.autoswitch-to-headset-profile = true
}
