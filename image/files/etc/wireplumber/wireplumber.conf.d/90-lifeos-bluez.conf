# LifeOS: stabilize Bluetooth headset behavior for always-on voice workflows.
# Avoid AVRCP absolute volume feedback loops that trigger repeated OSD volume changes.
monitor.bluez.properties = {
  bluez5.enable-hw-volume = false
  bluez5.autoswitch-profile = true
  bluez5.hfphsp-backend = "native"
  # Keep Bluetooth headsets in high-fidelity playback mode by default.
  # HFP/HSP profiles can become unstable on some devices (e.g. repeated
  # transport errors + stalled media playback), so LifeOS keeps A2DP as
  # default while still exposing headset profiles for call microphones.
  # Autoswitch lets call apps (Meet/Zoom) request the headset profile
  # automatically and switch back to A2DP when the mic is no longer needed.
  bluez5.roles = [ a2dp_sink a2dp_source hfp_hf hfp_ag hsp_hs hsp_ag ]
}
