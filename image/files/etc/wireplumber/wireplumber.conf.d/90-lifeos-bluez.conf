# LifeOS: stabilize Bluetooth headset behavior for always-on voice workflows.
# Avoid AVRCP absolute volume feedback loops that trigger repeated OSD volume changes.
monitor.bluez.properties = {
  bluez5.enable-hw-volume = false
  bluez5.autoswitch-profile = false
  # Keep Bluetooth headsets in high-fidelity playback mode by default.
  # HFP/HSP profiles can become unstable on some devices (e.g. repeated
  # transport errors + stalled media playback), so LifeOS prefers A2DP.
  bluez5.roles = [ a2dp_sink ]
}
