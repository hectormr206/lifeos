# LifeOS — Password complexity requirements (CIS Benchmark)
# Enforced via pam_pwquality. Applies to passwd, COSMIC greeter, etc.

# Minimum password length
minlen = 12

# Require at least 1 uppercase letter
ucredit = -1

# Require at least 1 lowercase letter
lcredit = -1

# Require at least 1 digit
dcredit = -1

# Require at least 1 special character
ocredit = -1

# Reject passwords containing the username
usercheck = 1

# Minimum number of character classes required (uppercase, lowercase, digit, special)
minclass = 3

# Maximum consecutive identical characters
maxrepeat = 3

# Remember last 5 passwords (prevent reuse)
# Note: pam_pwhistory handles this, configured separately
