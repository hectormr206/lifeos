# LifeOS — Block legacy/rarely-used filesystems (CIS Benchmark)
# Prevents attacks via crafted filesystem images on removable media.
# These filesystems have had multiple CVEs and are not needed on desktop.

# Legacy compressed ROM filesystem
install cramfs /bin/false
blacklist cramfs

# Veritas filesystem (legacy Unix)
install freevxfs /bin/false
blacklist freevxfs

# Apple HFS/HFS+ (use exfat for cross-platform USB)
install hfs /bin/false
blacklist hfs
install hfsplus /bin/false
blacklist hfsplus

# Universal Disk Format (optical media, rarely needed)
install udf /bin/false
blacklist udf

# Uncommon network filesystems
install jffs2 /bin/false
blacklist jffs2
