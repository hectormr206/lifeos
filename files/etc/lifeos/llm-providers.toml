# LifeOS LLM Providers Configuration
# Edit this file to add/remove/update models without recompiling.
# The daemon reads this at startup. Providers without a configured API key are skipped.
#
# Each provider needs a matching env var in llm-providers.env
# Priority order: providers listed first are tried first.

# =============================================================================
# HIGH PRIVACY — zero data retention, never train on your data
# =============================================================================

[[providers]]
name = "local"
api_base = "http://127.0.0.1:8082"
api_key_env = ""
model = "local"
api_format = "openai_compatible"
cost_input_per_m = 0.0
cost_output_per_m = 0.0
supports_vision = true
max_context = 6144
tier = "local"
privacy = "max"

