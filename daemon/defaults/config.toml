# LifeOS Factory Default Configuration
# Used as absolute last resort when all config is corrupt.

[ai]
model = "Qwen3.5-4B-Q4_K_M.gguf"
ctx_size = 16384
gpu_layers = 99
reasoning_budget = 0

[api]
# Phase 8b: dual-listener. UDS socket for CLI/daemon clients (SO_PEERCRED auth).
# TCP bind for browser dashboard (PublishPort=127.0.0.1:8081:8081 in Quadlet).
socket = "/run/lifeos/lifeosd.sock"
bind = "0.0.0.0:8081"

[privacy]
level = "careful"
