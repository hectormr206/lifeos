name: Release Channels

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: 'candidate'
        type: choice
        options:
          - stable
          - candidate
          - edge

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  determine-channel:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.set-channel.outputs.channel }}
      tag: ${{ steps.set-channel.outputs.tag }}
      version: ${{ steps.set-channel.outputs.version }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - id: set-channel
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "channel=stable" >> $GITHUB_OUTPUT
            echo "tag=stable" >> $GITHUB_OUTPUT
            VERSION=$(date +%Y.%m.%d)
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            echo "channel=stable" >> $GITHUB_OUTPUT
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "channel=edge" >> $GITHUB_OUTPUT
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=edge-$(date +%Y%m%d)-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "version=edge-$(date +%Y%m%d)-${SHORT_SHA}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHANNEL="${{ github.event.inputs.channel }}"
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
            echo "tag=${CHANNEL}-$(date +%Y%m%d)-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "version=${CHANNEL}-$(date +%Y%m%d)-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "channel=skip" >> $GITHUB_OUTPUT
            echo "tag=skip" >> $GITHUB_OUTPUT
            echo "version=skip" >> $GITHUB_OUTPUT
          fi
      
      - name: Channel info
        run: |
          echo "Channel: ${{ steps.set-channel.outputs.channel }}"
          echo "Tag: ${{ steps.set-channel.outputs.tag }}"
          echo "Version: ${{ steps.set-channel.outputs.version }}"

  build-and-push:
    needs: determine-channel
    if: needs.determine-channel.outputs.channel != 'skip'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set build metadata
        id: meta-build
        run: |
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.determine-channel.outputs.tag }}
            type=raw,value=${{ needs.determine-channel.outputs.channel }}
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: image/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LIFEOS_CHANNEL=${{ needs.determine-channel.outputs.channel }}
            LIFEOS_VERSION=${{ needs.determine-channel.outputs.version }}
            BUILD_DATE=${{ steps.meta-build.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.0'
      
      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
      
      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  generate-sbom:
    needs: [determine-channel, build-and-push]
    if: needs.determine-channel.outputs.channel != 'edge'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-channel.outputs.tag }}
          format: spdx-json
          output-file: sbom-${{ needs.determine-channel.outputs.channel }}.spdx.json
      
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.determine-channel.outputs.channel }}
          path: sbom-${{ needs.determine-channel.outputs.channel }}.spdx.json
          retention-days: 90

  update-channel-manifest:
    needs: [determine-channel, build-and-push]
    if: needs.determine-channel.outputs.channel != 'skip'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Update channel manifest
        run: |
          CHANNEL="${{ needs.determine-channel.outputs.channel }}"
          TAG="${{ needs.determine-channel.outputs.tag }}"
          VERSION="${{ needs.determine-channel.outputs.version }}"
          DIGEST="${{ needs.build-and-push.outputs.digest }}"
          DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          mkdir -p channels
          
          cat > channels/${CHANNEL}.json << EOF
          {
            "channel": "${CHANNEL}",
            "version": "${VERSION}",
            "tag": "${TAG}",
            "digest": "${DIGEST}",
            "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${TAG}",
            "released_at": "${DATE}",
            "commit": "${{ github.sha }}"
          }
          EOF
          
          cat channels/${CHANNEL}.json
      
      - name: Commit channel manifest
        env:
          CHANNEL: ${{ needs.determine-channel.outputs.channel }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels/*.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update ${CHANNEL} channel manifest [skip ci]"
          git push || echo "No changes to push"

  notify-release:
    needs: [determine-channel, build-and-push]
    if: needs.determine-channel.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    
    steps:
      - name: Create release notes
        run: |
          echo "## LifeOS ${{ needs.determine-channel.outputs.version }} Released" > release_notes.md
          echo "" >> release_notes.md
          echo "### Channel: Stable" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **Version**: ${{ needs.determine-channel.outputs.version }}" >> release_notes.md
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-channel.outputs.tag }}" >> release_notes.md
          echo "- **Commit**: ${{ github.sha }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Verification" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "cosign verify \\" >> release_notes.md
          echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}/*' \\" >> release_notes.md
          echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\" >> release_notes.md
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-channel.outputs.tag }}" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          
          cat release_notes.md
      
      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-stable
          path: release_notes.md
