name: Release Channels

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: 'candidate'
        type: choice
        options:
          - stable
          - candidate
          - edge

concurrency:
  group: release-channels-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TMPDIR: /var/tmp

jobs:
  determine-channel:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.set-channel.outputs.channel }}
      tag: ${{ steps.set-channel.outputs.tag }}
      version: ${{ steps.set-channel.outputs.version }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - id: set-channel
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "channel=stable" >> $GITHUB_OUTPUT
            echo "tag=stable" >> $GITHUB_OUTPUT
            VERSION=$(date +%Y.%m.%d)
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            echo "channel=stable" >> $GITHUB_OUTPUT
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "channel=edge" >> $GITHUB_OUTPUT
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=edge-$(date +%Y%m%d)-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "version=edge-$(date +%Y%m%d)-${SHORT_SHA}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHANNEL="${{ github.event.inputs.channel }}"
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
            echo "tag=${CHANNEL}-$(date +%Y%m%d)-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "version=${CHANNEL}-$(date +%Y%m%d)-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "channel=skip" >> $GITHUB_OUTPUT
            echo "tag=skip" >> $GITHUB_OUTPUT
            echo "version=skip" >> $GITHUB_OUTPUT
          fi
      
      - name: Channel info
        run: |
          echo "Channel: ${{ steps.set-channel.outputs.channel }}"
          echo "Tag: ${{ steps.set-channel.outputs.tag }}"
          echo "Version: ${{ steps.set-channel.outputs.version }}"

  build-and-push:
    needs: determine-channel
    if: needs.determine-channel.outputs.channel != 'skip'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Reclaim disk space
        shell: bash
        run: |
          set -euo pipefail
          min_free_gb=20

          free_gb_before="$(df --output=avail -BG /var | tail -n1 | tr -dc '0-9')"
          echo "Free space before reclaim: ${free_gb_before}GB"
          df -h
          if [[ "${{ runner.environment }}" == "github-hosted" ]]; then
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
            docker system prune -af || true
          fi

          # Keep cleanup deterministic on self-hosted without aggressively deleting
          # resources that may be used by concurrent jobs.
          podman image prune -af || true
          podman volume prune -f || true
          podman container prune -f || true
          podman builder prune -af || true
          sudo find /var/tmp -maxdepth 1 -type d -name 'buildah*' -mtime +1 -exec rm -rf {} + || true
          find /tmp -maxdepth 1 -type d -name 'buildah*' -mtime +1 -exec rm -rf {} + || true

          free_gb_after="$(df --output=avail -BG /var | tail -n1 | tr -dc '0-9')"
          echo "Free space after reclaim: ${free_gb_after}GB"
          df -h
          if (( free_gb_after < min_free_gb )); then
            echo "::error::Insufficient disk space after cleanup (${free_gb_after}GB free, require >= ${min_free_gb}GB)"
            exit 1
          fi
      
      - name: Set build metadata
        id: meta-build
        run: |
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Validate NVIDIA Secure Boot signing secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.LIFEOS_NVIDIA_KMOD_SIGN_KEY_B64 }}" || -z "${{ secrets.LIFEOS_NVIDIA_KMOD_CERT_DER_B64 }}" ]]; then
            echo "::error::Missing required secrets for NVIDIA Secure Boot image signing:"
            echo "::error::LIFEOS_NVIDIA_KMOD_SIGN_KEY_B64 and/or LIFEOS_NVIDIA_KMOD_CERT_DER_B64"
            echo "::error::Refusing to publish release-channel images with unsigned NVIDIA modules."
            exit 1
          fi

      - name: Build and push (podman)
        id: build
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG_PRIMARY="${{ needs.determine-channel.outputs.tag }}"
          TAG_CHANNEL="${{ needs.determine-channel.outputs.channel }}"
          LOCAL_IMAGE="lifeos-release:${{ github.sha }}"
          DIGEST_FILE="${RUNNER_TEMP}/lifeos-image.digest"

          mkdir -p "${HOME}/.docker"
          AUTH_FILE="${HOME}/.docker/config.json"
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin --authfile "${AUTH_FILE}"
          export REGISTRY_AUTH_FILE="${AUTH_FILE}"
          echo "DOCKER_CONFIG=${HOME}/.docker" >> "${GITHUB_ENV}"

          # Pull the previous edge image as cache source so unchanged layers
          # (base OS, packages, models) are reused. Only changed layers (binaries,
          # configs) are rebuilt. This reduces client update download from ~4.7GB
          # to ~200-500MB for code-only changes.
          podman pull "${IMAGE_BASE}:${TAG_CHANNEL}" 2>/dev/null || true

          podman build \
            -f image/Containerfile \
            -t "${LOCAL_IMAGE}" \
            --cache-from="${IMAGE_BASE}:${TAG_CHANNEL}" \
            --label org.opencontainers.image.source="https://github.com/${{ github.repository }}" \
            --label org.opencontainers.image.revision="${{ github.sha }}" \
            --label org.opencontainers.image.created="${{ steps.meta-build.outputs.build_date }}" \
            --build-arg LIFEOS_CHANNEL="${{ needs.determine-channel.outputs.channel }}" \
            --build-arg LIFEOS_VERSION="${{ needs.determine-channel.outputs.version }}" \
            --build-arg BUILD_DATE="${{ steps.meta-build.outputs.build_date }}" \
            --build-arg VCS_REF="${{ github.sha }}" \
            --build-arg LIFEOS_NVIDIA_KMOD_SIGN_KEY_B64="${{ secrets.LIFEOS_NVIDIA_KMOD_SIGN_KEY_B64 }}" \
            --build-arg LIFEOS_NVIDIA_KMOD_CERT_DER_B64="${{ secrets.LIFEOS_NVIDIA_KMOD_CERT_DER_B64 }}" \
            .

          podman run --rm --entrypoint /bin/bash "${LOCAL_IMAGE}" -lc '
            set -euo pipefail
            test -s /usr/share/lifeos/secureboot/lifeos-nvidia-kmod.der
            mod="$(find /usr/lib/modules -type f -path "*/extra/nvidia/nvidia.ko" | head -n1 || true)"
            if [[ -z "${mod}" ]]; then
              echo "ERROR: nvidia.ko not found in image"
              exit 1
            fi
            signer="$(modinfo -F signer "${mod}" || true)"
            if [[ -z "${signer}" ]]; then
              echo "WARNING: modinfo reports ${mod} unsigned — may be false-negative in container (no running kernel)"
              # Verify signature magic bytes appended by sign-file (PKCS#7 marker "~Module signature appended~")
              if tail -c 28 "${mod}" | grep -q "~Module signature appended~"; then
                echo "INFO: PKCS#7 signature marker found in ${mod} — signing succeeded"
              else
                echo "ERROR: ${mod} has no signature marker; signing failed"
                exit 1
              fi
            else
              echo "Verified NVIDIA signing in image (${mod}) signer=${signer}"
            fi
          '

          podman push --digestfile "${DIGEST_FILE}" "${LOCAL_IMAGE}" "docker://${IMAGE_BASE}:${TAG_PRIMARY}"
          podman push "${LOCAL_IMAGE}" "docker://${IMAGE_BASE}:${TAG_CHANNEL}"

          DIGEST="$(cat "${DIGEST_FILE}")"
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "Published ${IMAGE_BASE}:${TAG_PRIMARY} and ${IMAGE_BASE}:${TAG_CHANNEL}"
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.0'
      
      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
      
      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  generate-sbom:
    needs: [determine-channel, build-and-push]
    if: needs.determine-channel.outputs.channel != 'edge'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-channel.outputs.tag }}
          format: spdx-json
          output-file: sbom-${{ needs.determine-channel.outputs.channel }}.spdx.json
      
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.determine-channel.outputs.channel }}
          path: sbom-${{ needs.determine-channel.outputs.channel }}.spdx.json
          retention-days: 90

  update-channel-manifest:
    needs: [determine-channel, build-and-push]
    if: needs.determine-channel.outputs.channel != 'skip'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      
      - name: Update channel manifest
        run: |
          CHANNEL="${{ needs.determine-channel.outputs.channel }}"
          TAG="${{ needs.determine-channel.outputs.tag }}"
          VERSION="${{ needs.determine-channel.outputs.version }}"
          DIGEST="${{ needs.build-and-push.outputs.digest }}"
          DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          mkdir -p channels
          
          cat > channels/${CHANNEL}.json << EOF
          {
            "channel": "${CHANNEL}",
            "version": "${VERSION}",
            "tag": "${TAG}",
            "digest": "${DIGEST}",
            "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${TAG}",
            "released_at": "${DATE}",
            "commit": "${{ github.sha }}"
          }
          EOF
          
          cat channels/${CHANNEL}.json
      
      - name: Commit channel manifest
        env:
          CHANNEL: ${{ needs.determine-channel.outputs.channel }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "channels/${CHANNEL}.json"

          if git diff --cached --quiet; then
            echo "No channel manifest changes to commit"
            exit 0
          fi

          git commit -m "chore: update ${CHANNEL} channel manifest [skip ci]"
          git push origin "HEAD:${DEFAULT_BRANCH}"

  notify-release:
    needs: [determine-channel, build-and-push]
    if: needs.determine-channel.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    
    steps:
      - name: Create release notes
        run: |
          echo "## LifeOS ${{ needs.determine-channel.outputs.version }} Released" > release_notes.md
          echo "" >> release_notes.md
          echo "### Channel: Stable" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **Version**: ${{ needs.determine-channel.outputs.version }}" >> release_notes.md
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-channel.outputs.tag }}" >> release_notes.md
          echo "- **Commit**: ${{ github.sha }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Verification" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "cosign verify \\" >> release_notes.md
          echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}/*' \\" >> release_notes.md
          echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\" >> release_notes.md
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-channel.outputs.tag }}" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          
          cat release_notes.md
      
      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-stable
          path: release_notes.md
