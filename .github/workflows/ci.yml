name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Job 1: Build and Test CLI
  # ============================================================================
  build-cli:
    name: Build CLI
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            cli/target/
          key: ${{ runner.os }}-cargo-cli-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cli-

      - name: Check formatting
        working-directory: ./cli
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: ./cli
        run: cargo clippy --all-features -- -D warnings

      - name: Build CLI (debug)
        working-directory: ./cli
        run: cargo build

      - name: Build CLI (release)
        working-directory: ./cli
        run: cargo build --release

      - name: Run CLI tests
        working-directory: ./cli
        run: cargo test --all-features

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: life-cli-${{ github.sha }}
          path: cli/target/release/life
          if-no-files-found: error
          retention-days: 7

  # ============================================================================
  # Job 2: Build and Test Daemon
  # ============================================================================
  build-daemon:
    name: Build Daemon
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1
          components: rustfmt, clippy

      - name: Install system dependencies
        run: bash scripts/ci/install-linux-deps.sh daemon

      - name: Verify daemon prerequisites
        run: bash scripts/check-daemon-prereqs.sh

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            daemon/target/
          key: ${{ runner.os }}-cargo-daemon-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-daemon-

      - name: Check formatting
        working-directory: ./daemon
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: ./daemon
        run: cargo clippy --all-features -- -D warnings

      - name: Build daemon (debug)
        working-directory: ./daemon
        run: cargo build --all-features

      - name: Build daemon (release)
        working-directory: ./daemon
        run: cargo build --release --all-features

      - name: Run daemon tests
        working-directory: ./daemon
        run: cargo test --all-features

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifeosd-${{ github.sha }}
          path: daemon/target/release/lifeosd
          if-no-files-found: error
          retention-days: 7

  # ============================================================================
  # Job 3: Integration Tests
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: [self-hosted, Linux, X64]
    needs: [build-cli, build-daemon]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: life-cli-${{ github.sha }}
          path: ./artifacts/

      - name: Download daemon artifact
        uses: actions/download-artifact@v4
        with:
          name: lifeosd-${{ github.sha }}
          path: ./artifacts/

      - name: Make binaries executable
        run: chmod +x ./artifacts/*

      - name: Run integration tests
        run: cargo test --package lifeos-integration-tests --test integration_tests -- --test-threads=1

  # ============================================================================
  # Job 4: Security Audit
  # ============================================================================
  security-audit:
    name: Security Audit
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Prepare security artifacts directory
        run: mkdir -p artifacts

      - name: Generate cargo-audit report (CLI)
        run: |
          cargo audit --json --file Cargo.lock > artifacts/audit-cli.json || true
          if [ ! -s artifacts/audit-cli.json ]; then
            echo '{"vulnerabilities":{"found":false,"count":0,"list":[]}}' > artifacts/audit-cli.json
          fi

      - name: Generate cargo-audit report (Daemon)
        run: |
          cargo audit --json --file Cargo.lock > artifacts/audit-daemon.json || true
          if [ ! -s artifacts/audit-daemon.json ]; then
            echo '{"vulnerabilities":{"found":false,"count":0,"list":[]}}' > artifacts/audit-daemon.json
          fi

      - name: Enforce CVE SLO policy (CLI)
        run: |
          python3 scripts/cve-slo-enforce.py \
            --audit artifacts/audit-cli.json \
            --policy security/cve_slo_policy.json \
            --waivers security/cve_waivers.json \
            --report artifacts/cve-slo-cli-report.json

      - name: Enforce CVE SLO policy (Daemon)
        run: |
          python3 scripts/cve-slo-enforce.py \
            --audit artifacts/audit-daemon.json \
            --policy security/cve_slo_policy.json \
            --waivers security/cve_waivers.json \
            --report artifacts/cve-slo-daemon-report.json

  # ============================================================================
  # Job 5: Runtime Security Regression
  # ============================================================================
  runtime-security:
    name: Runtime Security Tests
    runs-on: [self-hosted, Linux, X64]
    needs: [build-daemon]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download daemon artifact
        uses: actions/download-artifact@v4
        with:
          name: lifeosd-${{ github.sha }}
          path: ./artifacts/

      - name: Ensure runtime dependencies
        run: bash scripts/ci/install-linux-deps.sh runtime

      - name: Make daemon binary executable
        run: chmod +x ./artifacts/lifeosd

      - name: Run runtime security tests
        env:
          LIFEOS_DAEMON_BIN: ${{ github.workspace }}/artifacts/lifeosd
        run: bash tests/security_tests.sh

  # ============================================================================
  # Job 6: Code Coverage
  # ============================================================================
  coverage:
    name: Code Coverage
    runs-on: [self-hosted, Linux, X64]
    needs: [build-cli, build-daemon]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage report (CLI)
        working-directory: ./cli
        run: cargo tarpaulin --out Xml --output-dir ./coverage
        continue-on-error: true

      - name: Generate coverage report (Daemon)
        working-directory: ./daemon
        run: cargo tarpaulin --out Xml --output-dir ./coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cli/coverage/cobertura.xml,./daemon/coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Job 7: Documentation Build
  # ============================================================================
  docs:
    name: Build Documentation
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Install daemon documentation dependencies
        run: bash scripts/ci/install-linux-deps.sh daemon

      - name: Build CLI documentation
        working-directory: ./cli
        run: cargo doc --no-deps

      - name: Build daemon documentation
        working-directory: ./daemon
        run: cargo doc --no-deps

      - name: Check for doc warnings
        working-directory: ./cli
        run: cargo doc --no-deps 2>&1 | grep -i warning && exit 1 || exit 0
        continue-on-error: true
