name: CodeQL Security Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Sundays at 00:00
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    env:
      TMPDIR: /var/tmp
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check code scanning availability
        id: code-scanning
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request("GET /repos/{owner}/{repo}/code-scanning/default-setup", {
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              core.info("Code scanning is enabled.");
              core.setOutput("enabled", "true");
            } catch (error) {
              core.warning(`Code scanning is not enabled for this repository; skipping CodeQL analysis. (${error.status || "unknown"})`);
              core.setOutput("enabled", "false");
            }

      - name: Initialize CodeQL
        if: steps.code-scanning.outputs.enabled == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Install Rust toolchain
        if: steps.code-scanning.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Install daemon build dependencies
        if: steps.code-scanning.outputs.enabled == 'true'
        run: bash scripts/ci/install-linux-deps.sh daemon

      - name: Build CLI for CodeQL
        if: steps.code-scanning.outputs.enabled == 'true'
        working-directory: ./cli
        run: cargo build --release --locked

      - name: Build Daemon for CodeQL
        if: steps.code-scanning.outputs.enabled == 'true'
        working-directory: ./daemon
        run: cargo build --release --features "dbus,http-api,wake-word,messaging" --locked

      - name: Perform CodeQL Analysis
        if: steps.code-scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

      - name: CodeQL skipped
        if: steps.code-scanning.outputs.enabled != 'true'
        run: echo "CodeQL skipped because code scanning is not enabled for this repository."
