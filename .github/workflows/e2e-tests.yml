name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'daemon/**'
      - 'cli/**'
      - 'image/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    types: [labeled, synchronize, opened]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of E2E test to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - bootc-upgrade-rollback
          - smoke

jobs:
  # Smoke test - quick validation
  smoke-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1
          components: clippy, rustfmt

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build
        run: |
          cargo build --release --workspace
      
      - name: Run unit tests
        run: |
          cargo test --workspace --no-fail-fast
      
      - name: Check formatting
        run: |
          cargo fmt --all -- --check
      
      - name: Clippy
        run: |
          cargo clippy --all-targets --all-features -- -D warnings

  # Bootc upgrade/rollback test - comprehensive VM test
  bootc-upgrade-rollback:
    runs-on: ubuntu-latest
    # Run on: schedule, manual dispatch, PRs with e2e-test label, or main branch pushes
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e-test')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf /opt/ghc
          sudo docker system prune -af --volumes
          df -h
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            podman \
            libdbus-1-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            qemu-kvm \
            libvirt-daemon-system \
            virtinst \
            sshpass \
            openssl \
            xorriso \
            mtools
      
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1
          components: clippy
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build project
        run: |
          make build
      
      - name: Generate test ISO
        run: |
          chmod +x scripts/generate-iso-simple.sh
          sudo -E bash scripts/generate-iso-simple.sh --type iso --image localhost/lifeos:latest
        env:
          CI: true
          LIFEOS_INSTALL_MODE: unattended
          LIFEOS_OUTPUT_DIR: ${{ github.workspace }}/output
      
      - name: Verify ISO exists
        run: |
          if [ ! -f "output/lifeos-latest.iso" ]; then
            echo "ISO not found at output/lifeos-latest.iso"
            ls -la output/ || echo "output directory doesn't exist"
            exit 1
          fi
          ls -lh output/lifeos-latest.iso
      
      - name: Run bootc upgrade/rollback test
        run: |
          chmod +x tests/e2e/test_bootc_upgrade_rollback.sh
          ./tests/e2e/test_bootc_upgrade_rollback.sh \
            --iso output/lifeos-latest.iso \
            --verbose
        timeout-minutes: 45
        continue-on-error: true
        id: e2e_test
      
      - name: Capture VM logs
        if: always()
        run: |
          mkdir -p /tmp/bootc-test-logs
          
          # Try to capture logs from VM if still accessible
          if command -v virsh &> /dev/null; then
            virsh dumpxml lifeos-bootc-test > /tmp/bootc-test-logs/vm-config.xml 2>/dev/null || true
            virsh console lifeos-bootc-test --force > /tmp/bootc-test-logs/vm-console.log 2>&1 || true
          fi
          
          # Copy any test logs
          cp -r /tmp/bootc-test-*.log /tmp/bootc-test-logs/ 2>/dev/null || true
          
          # Create summary
          echo "E2E Test Run: $(date)" > /tmp/bootc-test-logs/summary.txt
          echo "Status: ${{ steps.e2e_test.outcome }}" >> /tmp/bootc-test-logs/summary.txt
      
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootc-test-logs-${{ github.sha }}
          path: /tmp/bootc-test-logs/
          retention-days: 7
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: |
            test-results/
            coverage/
          retention-days: 7
      
      - name: Check test result
        if: steps.e2e_test.outcome == 'failure'
        run: |
          echo "::error::E2E tests failed. Check the uploaded logs for details."
          exit 1

  # Integration test - daemon + CLI interaction
  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run integration tests
        run: |
          cargo test --package lifeos-integration-tests --no-fail-fast -- --test-threads=1
        timeout-minutes: 15
      
      - name: Upload integration test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs-${{ github.sha }}
          path: |
            /tmp/lifeos-test-*.log
            test-results/
          retention-days: 7

  # Notify on E2E test failures
  notify-failure:
    runs-on: ubuntu-latest
    needs: [bootc-upgrade-rollback]
    if: failure() && github.event_name == 'schedule'
    
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'E2E Tests Failed - ${(new Date()).toDateString()}',
              body: `## E2E Test Failure
            
            The scheduled E2E tests failed on ${new Date().toISOString()}.
            
            ### Details
            - **Workflow**: ${context.workflow}
            - **Run ID**: ${context.runId}
            - **Commit**: ${context.sha}
            - **Branch**: ${context.ref}
            
            ### Actions
            - [View workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            - Check the uploaded artifacts for detailed logs
            
            ### Labels
            This issue was automatically created by the E2E test workflow.`,
              labels: ['automated', 'e2e-test-failure', 'needs-triage']
            })
