name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'daemon/**'
      - 'cli/**'
      - 'image/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    types: [labeled, synchronize, opened]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of E2E test to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - bootc-upgrade-rollback
          - smoke

env:
  TMPDIR: /var/tmp

jobs:
  # Smoke test - quick validation
  smoke-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1
          components: clippy, rustfmt

      - name: Install build dependencies
        run: bash scripts/ci/install-linux-deps.sh daemon
      
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build
        run: |
          cargo build --release --workspace --locked
      
      - name: Run unit tests
        run: |
          cargo test --workspace --no-fail-fast --locked
      
      - name: Check formatting
        run: |
          cargo fmt --all -- --check
      
      - name: Clippy
        run: |
          cargo clippy --all-targets --locked -- -D warnings

  # Bootc upgrade/rollback test - comprehensive VM test
  bootc-upgrade-rollback:
    runs-on: ubuntu-latest
    # Run on: schedule, manual dispatch, PRs with e2e-test label, or main branch pushes
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e-test'))
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check runner prerequisites
        id: host_prereqs
        shell: bash
        run: |
          set -euo pipefail
          if ! sudo -n true >/dev/null 2>&1; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping bootc-upgrade-rollback: passwordless sudo is not available on this runner."
            exit 0
          fi

          missing=()
          for cmd in podman qemu-system-x86_64 virsh virt-install sshpass openssl xorriso mcopy; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              missing+=("$cmd")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping bootc-upgrade-rollback: missing host prerequisites: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
      
      - name: Free disk space
        if: steps.host_prereqs.outputs.ready == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android/sdk || true
          sudo rm -rf /opt/ghc || true
          if command -v docker >/dev/null 2>&1; then
            sudo docker system prune -af --volumes || true
          fi
          df -h
      
      - name: Install system dependencies
        if: steps.host_prereqs.outputs.ready == 'true'
        run: |
          bash scripts/ci/install-linux-deps.sh daemon
          bash scripts/ci/install-linux-deps.sh e2e
      
      - name: Enable KVM
        if: steps.host_prereqs.outputs.ready == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm
      
      - name: Install Rust
        if: steps.host_prereqs.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1
          components: clippy
      
      - name: Cache cargo
        if: steps.host_prereqs.outputs.ready == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build project
        if: steps.host_prereqs.outputs.ready == 'true'
        run: |
          make build
      
      - name: Generate test ISO
        if: steps.host_prereqs.outputs.ready == 'true'
        run: |
          chmod +x scripts/generate-iso-simple.sh
          sudo -E bash scripts/generate-iso-simple.sh --type iso --image localhost/lifeos:latest
        env:
          CI: true
          LIFEOS_INSTALL_MODE: unattended
          LIFEOS_OUTPUT_DIR: ${{ github.workspace }}/output
      
      - name: Verify ISO exists
        if: steps.host_prereqs.outputs.ready == 'true'
        run: |
          if [ ! -f "output/lifeos-latest.iso" ]; then
            echo "ISO not found at output/lifeos-latest.iso"
            ls -la output/ || echo "output directory doesn't exist"
            exit 1
          fi
          ls -lh output/lifeos-latest.iso
      
      - name: Run bootc upgrade/rollback test
        if: steps.host_prereqs.outputs.ready == 'true'
        run: |
          chmod +x tests/e2e/test_bootc_upgrade_rollback.sh
          ./tests/e2e/test_bootc_upgrade_rollback.sh \
            --iso output/lifeos-latest.iso \
            --verbose
        timeout-minutes: 45
        continue-on-error: true
        id: e2e_test
      
      - name: Capture VM logs
        if: always() && steps.host_prereqs.outputs.ready == 'true'
        run: |
          mkdir -p /tmp/bootc-test-logs
          
          # Try to capture logs from VM if still accessible
          if command -v virsh &> /dev/null; then
            virsh dumpxml lifeos-bootc-test > /tmp/bootc-test-logs/vm-config.xml 2>/dev/null || true
            virsh console lifeos-bootc-test --force > /tmp/bootc-test-logs/vm-console.log 2>&1 || true
          fi
          
          # Copy any test logs
          cp -r /tmp/bootc-test-*.log /tmp/bootc-test-logs/ 2>/dev/null || true
          
          # Create summary
          echo "E2E Test Run: $(date)" > /tmp/bootc-test-logs/summary.txt
          echo "Status: ${{ steps.e2e_test.outcome }}" >> /tmp/bootc-test-logs/summary.txt
      
      - name: Upload test logs
        if: always() && steps.host_prereqs.outputs.ready == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: bootc-test-logs-${{ github.sha }}
          path: /tmp/bootc-test-logs/
          retention-days: 7
      
      - name: Upload test results
        if: always() && steps.host_prereqs.outputs.ready == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: test-results-${{ github.sha }}
          path: |
            test-results/
            coverage/
          retention-days: 7
      
      - name: Check test result
        if: steps.host_prereqs.outputs.ready == 'true' && steps.e2e_test.outcome == 'failure'
        run: |
          echo "::error::E2E tests failed. Check the uploaded logs for details."
          exit 1

  # Integration test - daemon + CLI interaction
  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1
      
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run integration tests
        run: |
          cargo test --package lifeos-integration-tests --no-fail-fast --locked -- --test-threads=1
        timeout-minutes: 15
      
      - name: Upload integration test logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-logs-${{ github.sha }}
          path: |
            /tmp/lifeos-test-*.log
            test-results/
          retention-days: 7

  # Notify on E2E test failures
  notify-failure:
    runs-on: ubuntu-latest
    needs: [bootc-upgrade-rollback]
    if: github.event_name == 'schedule' && needs.bootc-upgrade-rollback.result == 'failure'
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `E2E Tests Failed - ${(new Date()).toDateString()}`,
              body: `## E2E Test Failure
            
            The scheduled E2E tests failed on ${new Date().toISOString()}.
            
            ### Details
            - **Workflow**: ${context.workflow}
            - **Run ID**: ${context.runId}
            - **Commit**: ${context.sha}
            - **Branch**: ${context.ref}
            
            ### Actions
            - [View workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            - Check the uploaded artifacts for detailed logs
            
            ### Labels
            This issue was automatically created by the E2E test workflow.`,
              labels: ['automated', 'e2e-test-failure', 'needs-triage']
            })
