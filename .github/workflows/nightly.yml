name: Nightly Tests

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  TMPDIR: /var/tmp

jobs:
  # ============================================================================
  # Nightly Full Test Suite
  # ============================================================================
  nightly-tests:
    name: Nightly Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Install system dependencies
        run: bash scripts/ci/install-linux-deps.sh daemon

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked

      - name: Run security audit
        run: |
          cargo audit --file Cargo.lock

      - name: Check for outdated dependencies
        run: |
          cd cli && cargo outdated || true
          cd ../daemon && cargo outdated || true

      - name: Run full test suite
        run: |
          cd cli && cargo test --all-features --locked
          cd ../daemon && cargo test --features "dbus,http-api,ui-overlay,wake-word,telegram" --locked

      - name: Build documentation
        run: |
          cd cli && cargo doc --no-deps --locked
          cd ../daemon && cargo doc --no-deps --locked

  # ============================================================================
  # Nightly Container Build
  # ============================================================================
  nightly-container:
    name: Nightly Container Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Podman
        run: bash scripts/ci/install-linux-deps.sh podman

      - name: Reject dev-mode references in CI
        run: |
          set -euo pipefail
          if grep -rn "LIFEOS_BUILD_MODE=dev" .github/workflows/; then
            echo "FATAL: LIFEOS_BUILD_MODE=dev must never appear in CI workflows"
            exit 1
          fi

      - name: Build container image
        run: |
          podman build \
            --build-arg LIFEOS_BUILD_MODE=release \
            -t lifeos:nightly \
            -f image/Containerfile .

      - name: Verify no dev-mode artifacts in nightly image
        run: |
          podman run --rm --entrypoint /bin/bash lifeos:nightly -lc '
            set -euo pipefail
            if [ -f /etc/sudoers.d/lifeos-dev ]; then
              echo "FATAL: /etc/sudoers.d/lifeos-dev present in release image"
              exit 1
            fi
            if [ -f /etc/systemd/user/lifeosd.service.d/10-dev-mode.conf ]; then
              echo "FATAL: dev-mode dropin present in release image"
              exit 1
            fi
            echo "dev-mode leak check passed"
          '

      - name: Run container tests
        run: |
          podman run --rm --entrypoint /bin/sh lifeos:nightly -lc \
            'life --version && command -v lifeosd && rustfmt --version && cargo audit --version'

      - name: Push nightly image
        env:
          REGISTRY: ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman push lifeos:nightly ${{ env.REGISTRY }}/${{ github.repository }}:nightly
