name: Docker Build and Push

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COSIGN_EXPERIMENTAL: "1"

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Necesario para OIDC e in-toto/sigstore

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate NVIDIA Secure Boot signing secrets
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.LIFEOS_NVIDIA_KMOD_SIGN_KEY_B64 }}" || -z "${{ secrets.LIFEOS_NVIDIA_KMOD_CERT_DER_B64 }}" ]]; then
            echo "::error::Missing required secrets for NVIDIA Secure Boot image signing:"
            echo "::error::LIFEOS_NVIDIA_KMOD_SIGN_KEY_B64 and/or LIFEOS_NVIDIA_KMOD_CERT_DER_B64"
            echo "::error::Refusing to publish unsigned release images."
            exit 1
          fi

      # Dev-mode guard: CI must never build dev images. See
      # docs/operations/dev-mode.md for the full contract.
      - name: Reject dev-mode references in CI
        run: |
          set -euo pipefail
          if grep -rn "LIFEOS_BUILD_MODE=dev" .github/workflows/; then
            echo "FATAL: LIFEOS_BUILD_MODE=dev must never appear in CI workflows"
            exit 1
          fi
          echo "dev-mode scanner passed"

      - name: Reject dev tags
        run: |
          set -euo pipefail
          for tag in "latest" "${{ github.sha }}"; do
            if echo "$tag" | grep -qE '(^|[-:])dev([-:]|$)'; then
              echo "FATAL: refusing to build image with dev tag: $tag"
              exit 1
            fi
          done
          echo "tag guard passed"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        id: build-and-push
        with:
          context: .
          file: ./image/Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            LIFEOS_BUILD_MODE=release
            LIFEOS_NVIDIA_KMOD_SIGN_KEY_B64=${{ secrets.LIFEOS_NVIDIA_KMOD_SIGN_KEY_B64 }}
            LIFEOS_NVIDIA_KMOD_CERT_DER_B64=${{ secrets.LIFEOS_NVIDIA_KMOD_CERT_DER_B64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # Dev-mode leak check: verify the published image does NOT contain
      # any dev affordances. Belt-and-suspenders over the Containerfile
      # verification block — if somehow a dev file slipped in, this step
      # fails the workflow before the image is consumed downstream.
      - name: Verify no dev-mode artifacts in image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker pull "${IMAGE}"
          docker run --rm --entrypoint /bin/bash "${IMAGE}" -lc '
            set -euo pipefail
            if [ -f /etc/sudoers.d/lifeos-dev ]; then
              echo "FATAL: /etc/sudoers.d/lifeos-dev present in release image"
              exit 1
            fi
            if [ -f /etc/systemd/user/lifeosd.service.d/10-dev-mode.conf ]; then
              echo "FATAL: dev-mode dropin present in release image"
              exit 1
            fi
            echo "dev-mode leak check passed"
          '

      - name: Verify NVIDIA signing artifacts in image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker pull "${IMAGE}"
          docker run --rm --entrypoint /bin/bash "${IMAGE}" -lc '
            set -euo pipefail
            test -s /usr/share/lifeos/secureboot/lifeos-nvidia-kmod.der
            mod="$(find /usr/lib/modules -type f -path "*/extra/nvidia/nvidia.ko" | head -n1 || true)"
            if [[ -z "${mod}" ]]; then
              echo "ERROR: nvidia.ko not found in image"
              exit 1
            fi
            signer="$(modinfo -F signer "${mod}" || true)"
            if [[ -z "${signer}" ]]; then
              echo "ERROR: ${mod} is unsigned"
              exit 1
            fi
            echo "Verified NVIDIA signing in image (${mod}) signer=${signer}"
          '

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (KMS/keyless)
        if: github.event_name != 'pull_request'
        env:
          IMAGE_DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          if [ -z "$IMAGE_DIGEST" ]; then
            echo "Build digest is empty; refusing to sign by tag."
            exit 1
          fi

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
          KMS_KEY_URI="${{ secrets.COSIGN_KMS_KEY_URI }}"

          if [ -n "$KMS_KEY_URI" ]; then
            echo "Signing image digest with KMS key: $KMS_KEY_URI"
            cosign sign --yes --key "$KMS_KEY_URI" "$IMAGE"
          else
            echo "COSIGN_KMS_KEY_URI not configured; using keyless OIDC signing"
            cosign sign --yes "$IMAGE"
          fi

      - name: Verify image signature
        if: github.event_name != 'pull_request'
        env:
          IMAGE_DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          if [ -z "$IMAGE_DIGEST" ]; then
            echo "Build digest is empty; cannot verify signature."
            exit 1
          fi

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$IMAGE"
