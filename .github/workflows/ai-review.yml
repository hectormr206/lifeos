name: AI Reviewer Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ai-review:
    name: AI Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache cargo and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ai-review-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ai-review-

      - name: Run AI reviewer gate
        run: python3 scripts/ai-review.py

      - name: Upload AI reviewer report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ai-review-report
          path: artifacts/ai-review-report.json
